<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗺️ TRIPI - Trip Management</title>
    
    <!-- Material Design Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/material.css">
</head>
<body>
    <!-- App Bar -->
    <header class="app-bar">
        <div class="toolbar">
            <h1 class="app-title">🗺️ TRIPI - Trip Management</h1>
        </div>
    </header>

    <!-- Main Container -->
    <main class="main-container">
        <div class="container">
            <!-- Tab Navigation -->
            <div class="tab-container">
                <nav class="tabs" role="tablist">
                    <button class="tab-button active" data-tab="0" role="tab" aria-controls="tab-panel-0" aria-selected="true">
                        My Trips
                    </button>
                    <button class="tab-button" data-tab="1" role="tab" aria-controls="tab-panel-1" aria-selected="false" disabled>
                        Trip Details
                    </button>
                    <button class="tab-button" data-tab="2" role="tab" aria-controls="tab-panel-2" aria-selected="false">
                        AI Trip Planner
                    </button>
                    <button class="tab-button" data-tab="3" role="tab" aria-controls="tab-panel-3" aria-selected="false">
                        Database Testing
                    </button>
                </nav>

                <!-- Tab Panels -->
                <div class="tab-panels">
                    <!-- My Trips Tab -->
                    <div id="tab-panel-0" class="tab-panel active" role="tabpanel" aria-labelledby="tab-0">
                        <div id="trip-list-container"></div>
                    </div>

                    <!-- Trip Details Tab -->
                    <div id="tab-panel-1" class="tab-panel" role="tabpanel" aria-labelledby="tab-1">
                        <div id="trip-detail-container"></div>
                    </div>

                    <!-- AI Trip Planner Tab -->
                    <div id="tab-panel-2" class="tab-panel" role="tabpanel" aria-labelledby="tab-2">
                        <div id="trip-planner-container"></div>
                    </div>

                    <!-- Database Testing Tab -->
                    <div id="tab-panel-3" class="tab-panel" role="tabpanel" aria-labelledby="tab-3">
                        <div id="database-testing-container"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal/Dialog Container -->
    <div id="modal-container"></div>

    <!-- Loading Spinner -->
    <div id="loading-overlay" class="loading-overlay hidden">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Loading...</p>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="toast-container"></div>

    <!-- External Libraries -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Application Scripts -->
    <script type="module" src="js/services/IndexedDBService.js"></script>
    <script type="module" src="js/services/GeminiService.js"></script>
    <script type="module" src="js/services/TripService.js"></script>
    <script type="module" src="js/components/TripList.js"></script>
    <script type="module" src="js/components/TripDetail.js"></script>
    <script type="module" src="js/components/TripPlanner.js"></script>
    <script type="module" src="js/components/MapView.js"></script>
    <script type="module" src="js/components/DatabaseTesting.js"></script>
    <script type="module" src="js/utils/helpers.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
